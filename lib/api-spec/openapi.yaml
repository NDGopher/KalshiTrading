openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Kalshi Sports AI Trading System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard overview
  - name: markets
    description: Market scanning
  - name: trades
    description: Trade history
  - name: agents
    description: Agent pipeline control
  - name: settings
    description: Trading settings
  - name: backtest
    description: Backtesting engine
  - name: paper-trades
    description: Paper trading
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/overview:
    get:
      operationId: getDashboardOverview
      tags: [dashboard]
      summary: Get dashboard overview
      description: Returns portfolio balance, P&L, win rate, and recent activity
      responses:
        "200":
          description: Dashboard overview data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverview"

  /markets/scan:
    post:
      operationId: triggerMarketScan
      tags: [markets]
      summary: Trigger a market scan
      description: Manually triggers the scanner agent to scan Kalshi sports markets
      responses:
        "200":
          description: Scan results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResult"

  /markets/opportunities:
    get:
      operationId: getMarketOpportunities
      tags: [markets]
      summary: Get current market opportunities
      description: Returns markets the scanner has identified with potential edge
      responses:
        "200":
          description: List of opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketOpportunity"

  /trades:
    get:
      operationId: listTrades
      tags: [trades]
      summary: List all trades
      description: Returns trade history with optional filters
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: status
          in: query
          schema:
            type: string
            enum: [open, won, lost, pending, cancelled, failed]
      responses:
        "200":
          description: List of trades
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeListResponse"

  /trades/stats:
    get:
      operationId: getTradeStats
      tags: [trades]
      summary: Get trading statistics
      description: Returns win rate, total P&L, ROI, and other stats
      responses:
        "200":
          description: Trading statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeStats"

  /agents/toggle:
    post:
      operationId: toggleAgentPipeline
      tags: [agents]
      summary: Start or stop the agent pipeline
      description: Toggle the automated trading pipeline on or off
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TogglePipelineBody"
      responses:
        "200":
          description: Pipeline status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineStatus"

  /agents/run-cycle:
    post:
      operationId: runTradingCycle
      tags: [agents]
      summary: Run one trading cycle manually
      description: Runs the full agent pipeline once (scan, analyze, audit, risk, execute)
      responses:
        "200":
          description: Cycle results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CycleResult"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get trading settings
      description: Returns current risk management and trading configuration
      responses:
        "200":
          description: Current settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update trading settings
      description: Update risk management and trading configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradingSettings"

  /settings/test-connection:
    post:
      operationId: testConnection
      tags: [settings]
      summary: Test Kalshi API connection
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  connected:
                    type: boolean
                  balance:
                    type: number
                  error:
                    type: string
                required:
                  - connected

  /portfolio/balance:
    get:
      operationId: getPortfolioBalance
      tags: [dashboard]
      summary: Get Kalshi portfolio balance
      description: Returns current Kalshi account balance
      responses:
        "200":
          description: Portfolio balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioBalance"

  /portfolio/positions:
    get:
      operationId: getPositions
      tags: [dashboard]
      summary: Get open positions
      description: Returns current open positions from Kalshi
      responses:
        "200":
          description: List of positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Position"

  /backtest/strategies:
    get:
      operationId: getBacktestStrategies
      tags: [backtest]
      summary: List available strategies
      responses:
        "200":
          description: Strategy names
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      type: string
                required:
                  - strategies

  /backtest/run:
    post:
      operationId: runBacktest
      tags: [backtest]
      summary: Run a backtest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRunRequest"
      responses:
        "200":
          description: Backtest started
          content:
            application/json:
              schema:
                type: object
                properties:
                  runId:
                    type: integer
                  message:
                    type: string
                required:
                  - runId
                  - message

  /backtest/results:
    get:
      operationId: getBacktestResults
      tags: [backtest]
      summary: Get backtest results with per-strategy aggregates
      responses:
        "200":
          description: List of backtest runs plus per-strategy aggregates
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/BacktestRun"
                  strategyAggregates:
                    type: array
                    items:
                      type: object
                      properties:
                        strategyName:
                          type: string
                        totalRuns:
                          type: integer
                        totalTrades:
                          type: integer
                        avgPnl:
                          type: number
                        avgWinRate:
                          type: number
                        avgRoi:
                          type: ["number", "null"]
                        avgClv:
                          type: ["number", "null"]
                        avgSharpe:
                          type: ["number", "null"]
                        dipCatchSuccessRate:
                          type: ["number", "null"]
                        bestRunId:
                          type: ["integer", "null"]
                        bestRunPnl:
                          type: ["number", "null"]
                      required:
                        - strategyName
                        - totalRuns
                        - totalTrades
                        - avgPnl
                        - avgWinRate
                required:
                  - runs
                  - strategyAggregates

  /backtest/trades:
    get:
      operationId: listBacktestTrades
      tags: [backtest]
      summary: Paginated list of backtest trades
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: runId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated backtest trades
          content:
            application/json:
              schema:
                type: object
                properties:
                  trades:
                    type: array
                    items:
                      $ref: "#/components/schemas/BacktestTrade"
                  page:
                    type: integer
                  limit:
                    type: integer
                required:
                  - trades
                  - page
                  - limit

  /backtest/trades/{runId}:
    get:
      operationId: getBacktestTrades
      tags: [backtest]
      summary: Get trades for a backtest run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest trades
          content:
            application/json:
              schema:
                type: object
                properties:
                  trades:
                    type: array
                    items:
                      $ref: "#/components/schemas/BacktestTrade"
                required:
                  - trades

  /backtest/strategy-summary:
    get:
      operationId: getBacktestStrategySummary
      tags: [backtest]
      summary: Get per-strategy aggregate backtest results
      responses:
        "200":
          description: Strategy aggregation
          content:
            application/json:
              schema:
                type: object
                properties:
                  strategies:
                    type: array
                    items:
                      type: object
                      properties:
                        strategyName:
                          type: string
                        totalRuns:
                          type: integer
                        totalTrades:
                          type: integer
                        avgPnl:
                          type: number
                        avgWinRate:
                          type: number
                        avgRoi:
                          type: ["number", "null"]
                        avgClv:
                          type: ["number", "null"]
                        avgSharpe:
                          type: ["number", "null"]
                        dipCatchSuccessRate:
                          type: ["number", "null"]
                        bestRunId:
                          type: ["integer", "null"]
                        bestRunPnl:
                          type: ["number", "null"]
                      required:
                        - strategyName
                        - totalRuns
                        - totalTrades
                        - avgPnl
                        - avgWinRate
                        - avgRoi
                        - avgClv
                        - avgSharpe
                required:
                  - strategies

  /backtest/ingest:
    post:
      operationId: ingestHistoricalMarkets
      tags: [backtest]
      summary: Ingest settled markets into historical database for backtesting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
              required:
                - startDate
                - endDate
      responses:
        "200":
          description: Ingestion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  ingested:
                    type: integer
                  skipped:
                    type: integer
                required:
                  - message
                  - ingested
                  - skipped

  /backtest/ingestion-stats:
    get:
      operationId: getIngestionStats
      tags: [backtest]
      summary: Get historical market ingestion statistics
      responses:
        "200":
          description: Ingestion statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalMarkets:
                    type: integer
                  settledMarkets:
                    type: integer
                  dateRange:
                    type: object
                    properties:
                      earliest:
                        type: string
                        nullable: true
                      latest:
                        type: string
                        nullable: true
                required:
                  - totalMarkets
                  - settledMarkets
                  - dateRange

  /paper-trades:
    get:
      operationId: getPaperTrades
      tags: [paper-trades]
      summary: List paper trades
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Paper trades
          content:
            application/json:
              schema:
                type: object
                properties:
                  trades:
                    type: array
                    items:
                      $ref: "#/components/schemas/PaperTrade"
                required:
                  - trades

  /paper-trades/stats:
    get:
      operationId: getPaperTradeStats
      tags: [paper-trades]
      summary: Get paper trading statistics
      responses:
        "200":
          description: Paper trading stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaperTradeStats"

  /paper-trades/reconcile:
    post:
      operationId: reconcilePaperTrades
      tags: [paper-trades]
      summary: Reconcile open paper trades
      responses:
        "200":
          description: Reconciliation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  settled:
                    type: integer
                  errors:
                    type: integer
                  total:
                    type: integer

  /paper-trades/reset:
    post:
      operationId: resetPaperTrades
      tags: [paper-trades]
      summary: Reset paper trading
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DashboardOverview:
      type: object
      properties:
        balance:
          type: number
        balanceError:
          type: boolean
        totalPnl:
          type: number
        todayPnl:
          type: number
        winRate:
          type: number
        totalTrades:
          type: integer
        openPositions:
          type: integer
        pipelineActive:
          type: boolean
        lastRunAt:
          type: ["string", "null"]
        paperTradingMode:
          type: boolean
      required:
        - balance
        - totalPnl
        - todayPnl
        - winRate
        - totalTrades
        - openPositions
        - pipelineActive
        - paperTradingMode

    ScanResult:
      type: object
      properties:
        marketsScanned:
          type: integer
        opportunitiesFound:
          type: integer
        scanDuration:
          type: number
        timestamp:
          type: string
      required:
        - marketsScanned
        - opportunitiesFound
        - scanDuration
        - timestamp

    MarketOpportunity:
      type: object
      properties:
        id:
          type: integer
        kalshiTicker:
          type: string
        title:
          type: string
        category:
          type: string
        currentYesPrice:
          type: number
        modelProbability:
          type: number
        edge:
          type: number
        confidence:
          type: number
        side:
          type: string
          enum: [yes, no]
        volume24h:
          type: number
        expiresAt:
          type: string
        createdAt:
          type: string
      required:
        - id
        - kalshiTicker
        - title
        - category
        - currentYesPrice
        - modelProbability
        - edge
        - confidence
        - side
        - expiresAt
        - createdAt

    Trade:
      type: object
      properties:
        id:
          type: integer
        kalshiTicker:
          type: string
        title:
          type: string
        side:
          type: string
          enum: [yes, no]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        quantity:
          type: integer
        pnl:
          type: ["number", "null"]
        status:
          type: string
          enum: [open, won, lost, pending, cancelled, failed]
        strategyName:
          type: ["string", "null"]
        modelProbability:
          type: number
        edge:
          type: number
        confidence:
          type: number
        clv:
          type: ["number", "null"]
        analystReasoning:
          type: ["string", "null"]
        auditorFlags:
          type: array
          items:
            type: string
        riskScore:
          type: number
        kellyFraction:
          type: number
        createdAt:
          type: string
        closedAt:
          type: ["string", "null"]
      required:
        - id
        - kalshiTicker
        - title
        - side
        - entryPrice
        - quantity
        - status
        - modelProbability
        - edge
        - confidence
        - riskScore
        - kellyFraction
        - createdAt

    TradeListResponse:
      type: object
      properties:
        trades:
          type: array
          items:
            $ref: "#/components/schemas/Trade"
        total:
          type: integer
      required:
        - trades
        - total

    TradeStats:
      type: object
      properties:
        totalTrades:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        todayPnl:
          type: number
        avgEdge:
          type: number
        avgConfidence:
          type: number
        currentStreak:
          type: integer
        bestStreak:
          type: integer
        worstStreak:
          type: integer
        roi:
          type: number
      required:
        - totalTrades
        - wins
        - losses
        - winRate
        - totalPnl
        - todayPnl
        - avgEdge
        - avgConfidence
        - currentStreak
        - bestStreak
        - worstStreak
        - roi

    AgentRun:
      type: object
      properties:
        id:
          type: integer
        agentName:
          type: string
        status:
          type: string
          enum: [success, error, skipped]
        duration:
          type: number
        details:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - agentName
        - status
        - duration
        - createdAt

    TogglePipelineBody:
      type: object
      properties:
        active:
          type: boolean
      required:
        - active

    PipelineStatus:
      type: object
      properties:
        active:
          type: boolean
        message:
          type: string
      required:
        - active
        - message

    CycleResult:
      type: object
      properties:
        marketsScanned:
          type: integer
        opportunitiesFound:
          type: integer
        tradesExecuted:
          type: integer
        tradesSkipped:
          type: integer
        totalDuration:
          type: number
        agentResults:
          type: array
          items:
            $ref: "#/components/schemas/AgentRun"
        paperMode:
          type: boolean
      required:
        - marketsScanned
        - opportunitiesFound
        - tradesExecuted
        - tradesSkipped
        - totalDuration
        - agentResults

    TradingSettings:
      type: object
      properties:
        id:
          type: integer
        maxPositionPct:
          type: number
        kellyFraction:
          type: number
        maxConsecutiveLosses:
          type: integer
        maxDrawdownPct:
          type: number
        maxSimultaneousPositions:
          type: integer
        minEdge:
          type: number
        minLiquidity:
          type: number
        minTimeToExpiry:
          type: integer
        confidencePenaltyPct:
          type: number
        sportFilters:
          type: array
          items:
            type: string
        scanIntervalMinutes:
          type: integer
        pipelineActive:
          type: boolean
        paperTradingMode:
          type: boolean
        paperBalance:
          type: number
        kalshiApiKeySet:
          type: boolean
        kalshiBaseUrl:
          type: ["string", "null"]
      required:
        - id
        - maxPositionPct
        - kellyFraction
        - maxConsecutiveLosses
        - maxDrawdownPct
        - maxSimultaneousPositions
        - minEdge
        - minLiquidity
        - minTimeToExpiry
        - confidencePenaltyPct
        - sportFilters
        - scanIntervalMinutes
        - pipelineActive
        - paperTradingMode
        - paperBalance
        - dailyBudgetUsd
        - monthlyBudgetUsd

    UpdateSettingsBody:
      type: object
      properties:
        maxPositionPct:
          type: number
        kellyFraction:
          type: number
        maxConsecutiveLosses:
          type: integer
        maxDrawdownPct:
          type: number
        maxSimultaneousPositions:
          type: integer
        minEdge:
          type: number
        minLiquidity:
          type: number
        minTimeToExpiry:
          type: integer
        confidencePenaltyPct:
          type: number
        sportFilters:
          type: array
          items:
            type: string
        scanIntervalMinutes:
          type: integer
        pipelineActive:
          type: boolean
        paperTradingMode:
          type: boolean
        paperBalance:
          type: number

    PortfolioBalance:
      type: object
      properties:
        balance:
          type: number
        availableBalance:
          type: number
      required:
        - balance
        - availableBalance

    Position:
      type: object
      properties:
        ticker:
          type: string
        title:
          type: string
        side:
          type: string
          enum: [yes, no]
        quantity:
          type: integer
        avgPrice:
          type: number
        currentPrice:
          type: number
        unrealizedPnl:
          type: number
        marketStatus:
          type: string
      required:
        - ticker
        - title
        - side
        - quantity
        - avgPrice
        - currentPrice
        - unrealizedPnl
        - marketStatus

    BacktestRunRequest:
      type: object
      properties:
        strategyName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        initialBankroll:
          type: number
        maxPositionPct:
          type: number
        kellyFraction:
          type: number
        minEdge:
          type: number
        minLiquidity:
          type: number
        useAiAnalysis:
          type: boolean
      required:
        - startDate
        - endDate

    BacktestRun:
      type: object
      properties:
        id:
          type: integer
        strategyName:
          type: string
        status:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        marketsEvaluated:
          type: integer
        tradesSimulated:
          type: integer
        totalPnl:
          type: number
        winRate:
          type: number
        sharpeRatio:
          type: ["number", "null"]
        maxDrawdown:
          type: ["number", "null"]
        avgEdge:
          type: ["number", "null"]
        avgClv:
          type: ["number", "null"]
        roi:
          type: ["number", "null"]
        bestStreak:
          type: ["integer", "null"]
        worstStreak:
          type: ["integer", "null"]
        dipCatchSuccessRate:
          type: ["number", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
      required:
        - id
        - strategyName
        - status
        - startDate
        - endDate
        - marketsEvaluated
        - tradesSimulated
        - totalPnl
        - winRate
        - createdAt

    BacktestTrade:
      type: object
      properties:
        id:
          type: integer
        backtestRunId:
          type: integer
        kalshiTicker:
          type: string
        title:
          type: string
        strategyName:
          type: string
        side:
          type: string
        entryPrice:
          type: number
        exitPrice:
          type: number
        quantity:
          type: integer
        pnl:
          type: number
        outcome:
          type: string
        modelProbability:
          type: number
        edge:
          type: number
        confidence:
          type: number
        clv:
          type: ["number", "null"]
        reasoning:
          type: ["string", "null"]
        marketResult:
          type: ["string", "null"]
        dipCatch:
          type: ["boolean", "null"]
        distanceFromPeak:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - backtestRunId
        - kalshiTicker
        - title
        - strategyName
        - side
        - entryPrice
        - exitPrice
        - quantity
        - pnl
        - outcome
        - modelProbability
        - edge
        - confidence
        - createdAt

    PaperTrade:
      type: object
      properties:
        id:
          type: integer
        kalshiTicker:
          type: string
        title:
          type: string
        side:
          type: string
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        quantity:
          type: integer
        pnl:
          type: ["number", "null"]
        status:
          type: string
        strategyName:
          type: ["string", "null"]
        modelProbability:
          type: number
        edge:
          type: number
        confidence:
          type: number
        riskScore:
          type: number
        kellyFraction:
          type: number
        simulatedBalance:
          type: number
        createdAt:
          type: string
        closedAt:
          type: ["string", "null"]
      required:
        - id
        - kalshiTicker
        - title
        - side
        - entryPrice
        - quantity
        - status
        - modelProbability
        - edge
